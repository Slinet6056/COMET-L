# 服务器侧部署配置示例，在 Web 服务启动时加载。

deployment:
  # 单次运行限制
  max_budget: 500
  max_run_timeout_seconds: 7200
  max_iterations: 10

  # Web 控制台允许用户选择的目标 Java 版本
  allowed_java_versions:
    - "8"
    - "11"
    - "17"
    - "21"
    - "25"

  # Cookie 与 CSRF Origin 策略。生产环境必须通过 HTTPS 访问，并启用 secure_auth_cookies。
  secure_auth_cookies: true
  allowed_origins:
    - "https://comet.example.internal"

  # 单进程 FIFO 调度器限制
  global_max_running_tasks: 2
  per_user_max_running_tasks: 1
  global_max_pending_tasks: 50
  per_user_max_pending_tasks: 5

  # 服务器本地路径模式仅供管理员使用；默认关闭。
  allow_local_path_mode: false
  local_path_allowlist: []

  # 数据保留策略
  upload_retention_hours: 24
  run_artifact_retention_days: 30

github:
  # GitHub 仓库导入、自动 push 或创建 PR 时需要配置 OAuth App。
  # 也可以使用 COMET_GITHUB_* 环境变量覆盖这些字段。
  oauth_client_id: 'Ov23li8u4R3dY2GGKzwq' # GitHub OAuth App Client ID
  oauth_client_secret: '468507776158b3c9c7cf503b8bafaca67b214cc9' # GitHub OAuth App Client Secret
  oauth_redirect_uri: 'http://127.0.0.1:8000/api/github/auth/callback' # 必须与 GitHub OAuth App 回调地址一致
  oauth_scope: 'repo' # 私有仓库与同仓 PR 需要 repo scope；只处理公开仓库时可按需收窄
  oauth_state_ttl_seconds: 600 # OAuth state 有效期（秒）
  oauth_authorize_url: 'https://github.com/login/oauth/authorize'
  oauth_token_exchange_url: 'https://github.com/login/oauth/access_token'
  oauth_api_base_url: 'https://api.github.com'
  encrypted_token_store_path: './state/github/auth/token.enc' # 本地加密 token 文件，建议挂载持久化
  encrypted_key_store_path: './state/github/auth/token.key' # fallback 加密密钥文件，必须与 token 分开保存但一起持久化
  managed_clone_root: './sandbox/github-managed' # GitHub 仓库受管 clone 根目录，建议挂载持久化或放在容器数据卷
  repo_url: null # 运行时由 Web 表单填入，通常不用手写
  base_branch: null # 运行时由 Web 表单或 GitHub 默认分支解析填入，通常不用手写
